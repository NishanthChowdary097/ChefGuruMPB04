user nginx;
worker_processes auto;

events { 
    worker_connections 1024; 
}

http {
    include /etc/nginx/mime.types;

    # ===================================
    # FRONTEND + MAIN APP API ROUTING
    # Applies to:
    #   majorproject.online
    #   localhost
    #   piserver.local
    #   piserver
    # ===================================
    server {
        listen 80;

        server_name 
            majorproject.online
            www.majorproject.online
            localhost
            127.0.0.1
            piserver.local
            piserver;

        # REMINDER: TEST THIS
        error_page 500 502 503 504 /error/error.html;
        error_page 400 /error/not_found.html;
        
        location = /error {
            root /usr/share/nginx/html;
            internal;
        }

        location = /not_found {
            root /usr/share/nginx/html;
        }

        # ---------- Frontend ----------
        location / {
            proxy_pass http://frontend:3000;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_http_version 1.1;
        }

        # ---------- Auth Service ----------
        location /api/auth/ {
            proxy_pass http://auth_server:8000;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_http_version 1.1;
        }

        # ---------- Main App API ----------
        location /api/app/ {
            proxy_pass http://main_server:8001;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_http_version 1.1;
        }
    }

    # ===================================
    #  METRICS SUBDOMAIN
    # Only routes metrics.majorproject.online
    # Local test: metrics.localhost also supported
    # ===================================
    server {
        listen 80;

        server_name 
            metrics.majorproject.online
            metrics.localhost
            metrics.piserver.local
            metrics.piserver;

        location / {
            proxy_pass http://grafana:3000;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_http_version 1.1;
        }
    }
}
