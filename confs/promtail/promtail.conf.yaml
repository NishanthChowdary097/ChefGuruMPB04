server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: python-logs
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 1m
    
    relabel_configs:
      - source_labels: [__meta_docker_container_label_com_krignal_log_type]
        target_label: log_type
      - source_labels: [__meta_docker_container_name]
        regex: "/(.*)"
        target_label: container
        replacement: "$1"
      - source_labels: [__meta_docker_container_log_stream]
        target_label: stream
  
    pipeline_stages:
      - match:
          selector: '{log_type="python"}'
          stages:
            - json:
                expressions:
                  ts: ts
                  msg: msg
                  lvl: lvl
                  mod: mod
                  svc: svc
            - timestamp:
                source: ts
                format: RFC3339Nano
            - labels:
                svc:
                mod:
                lvl:
            # - output:
            #     source: msg
      - match:
          selector: '{log_type="nginx", stream="stdout"}'
          stages:
            - json:
                expressions:
                  svc: svc
                  ts: ts
                  rma: rma
                  rl: rl
                  rm: rm
                  ru: ru
                  s: s
                  us: us
                  rbs: rbs
                  uag: uag
                  rt: rt
                  urs: urs
            - timestamp:
                source: ts
                format: RFC3339
            - labels:
                svc:
                rm:
                s:
            # - output:
            #     source: ru
      - match:
          selector: '{log_type="nginx", stream="stderr"}'
          stages:
            - regex:
                expression: >-
                  (?<timestamp>.{19})\ \[(?<sev>\w{4,6})\]\ \d+#\d+:\ (\*\d+\ )?(?<err_msg>(?:\"\S+\"\sis\snot\s)?(?<err_typ>\w+)[\s(](?:requests,\ excess:\ (?<err_rate>\d+\.\d+)\ by\ zone\ \"(?<err_zone>\S+)\"|.+?))(?:,\ client:\ (?<remote_addr>\d+\.\d+\.\d+\.\d+),\ server:\ (?<svr>[^,]+)(?:,\ request:\ \"(?<rm>[A-Z]{3,4})\ (?<ru>\/\S*?)(?<uri_query>\?\S+)?\ (?<protocol>\S+)\")?(?:,\ upstream:\ \"(?<upstream>.+?)\")?(?:,\ host:\ \"(?<req_host>\S+)\")?(?:,\ referrer:\ \"(?<referrer>\S+)\")?)?
            - timestamp:
                source: ts
                format: "2006/01/02 15:04:05"
            - labels:
                sev:
                err_typ:
                svr:
                rm:
                ru:
                svc: log_type
            - template:
                source: output_json
                template: '{"timestamp":"{{.timestamp}}","sev":"{{.sev}}","err_msg":"{{.err_msg}}","err_typ":"{{.err_typ}}","err_rate":"{{.err_rate}}","err_zone":"{{.err_zone}}","remote_addr":"{{.remote_addr}}","svr":"{{.svr}}","rm":"{{.rm}}","ru":"{{.ru}}","uri_query":"{{.uri_query}}","protocol":"{{.protocol}}","upstream":"{{.upstream}}","req_host":"{{.req_host}}","referrer":"{{.referrer}}"}'
            - output:
                source: output_json
