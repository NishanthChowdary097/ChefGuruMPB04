<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Reset Password</title>

<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=Fraunces:wght@600&display=swap" rel="stylesheet">

<style>
:root {
  --clr-primary:#E8531A;
  --clr-primary-dark:#C43D10;
  --clr-primary-light:#FF7040;
  --clr-accent:#1A7CE8;
  --clr-amber:#F5A623;
  --clr-bg:#FDF8F3;
  --clr-surface:#FFFFFF;
  --clr-surface2:#F5EEE6;
  --clr-dark:#1C1108;
  --clr-mid:#6B5744;
  --clr-light:#A8927D;
  --clr-border:#EAD9C9;
  --clr-success:#2A9D5C;

  --sp-1:8px;
  --sp-2:13px;
  --sp-3:21px;
  --sp-4:34px;
  --sp-5:55px;

  --font-display:'Fraunces', Georgia, serif;
  --font-body:'DM Sans', system-ui, sans-serif;

  --r-md:12px;
  --shadow-md:0 4px 16px rgba(28,17,8,.08),0 1px 4px rgba(28,17,8,.05);
  --shadow-lg:0 12px 40px rgba(28,17,8,.12),0 4px 12px rgba(28,17,8,.07);
}

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body,html{
height:100%;
font-family:var(--font-body);
background:var(--clr-bg);
}

.container{
display:flex;
justify-content:center;
align-items:center;
height:100vh;
padding:var(--sp-4);
}

.card{
background:var(--clr-surface);
padding:var(--sp-5);
border-radius:var(--r-md);
box-shadow:var(--shadow-lg);
width:100%;
max-width:420px;
border:1px solid var(--clr-border);
}

h2{
font-family:var(--font-display);
margin-bottom:var(--sp-4);
text-align:center;
color:var(--clr-dark);
}

label{
display:block;
margin-bottom:6px;
font-size:14px;
font-weight:500;
color:var(--clr-mid);
}

input[type="password"]{
width:100%;
padding:12px;
margin-bottom:var(--sp-3);
border:1px solid var(--clr-border);
border-radius:8px;
font-size:14px;
background:var(--clr-surface2);
transition:all .2s ease;
}

input:focus{
outline:none;
border-color:var(--clr-primary);
background:var(--clr-surface);
}

button{
width:100%;
padding:12px;
background:var(--clr-primary);
color:white;
border:none;
border-radius:8px;
font-size:15px;
font-weight:600;
cursor:pointer;
transition:all .2s ease;
box-shadow:0 6px 18px rgba(232,83,26,.25);
}

button:hover{
background:var(--clr-primary-dark);
transform:translateY(-1px);
}

.footer-text{
text-align:center;
margin-top:var(--sp-3);
font-size:12px;
color:var(--clr-light);
}

.error-message{
color:#c0392b;
font-size:14px;
margin-bottom:var(--sp-2);
}

.success-message{
color:var(--clr-success);
font-size:14px;
margin-bottom:var(--sp-2);
}
</style>
</head>

<body>
<div class="container">
<div class="card">

<h2>Reset Your Password</h2>

<div id="error" class="error-message"></div>
<div id="success" class="success-message"></div>

<label for="password">New Password</label>
<input type="password" name="password" id="password" required placeholder="Enter new password">

<label for="confirm_password">Confirm Password</label>
<input type="password" id="confirm_password" required placeholder="Confirm new password">

<button id="submitBtn">Reset Password</button>

<div class="footer-text">
&copy; {{ current_year }} Chef Guru
</div>

</div>
</div>

<script>
const password = document.getElementById("password");
const confirm = document.getElementById("confirm_password");
const errorDiv = document.getElementById("error");
const successDiv = document.getElementById("success");
const submitBtn = document.getElementById("submitBtn");

submitBtn.addEventListener("click", async function(e) {
  e.preventDefault();
  errorDiv.textContent = "";
  successDiv.textContent = "";

  if (password.value !== confirm.value) {
    errorDiv.textContent = "Passwords do not match.";
    return;
  }

  if (password.value.length < 8) {
    errorDiv.textContent = "Password must be at least 8 characters.";
    return;
  }

  const payload = {
    user_id: "{{ user_id }}",
    token: "{{ token }}",
    password: password.value
  };

  try {
    const response = await fetch("/api/auth/user/reset-pwd", {
      method: "PUT",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify(payload)
    });

    const data = await response.json();

    if (response.ok) {
      successDiv.textContent = "Password reset successful! Redirecting to login...";
      setTimeout(() => {
        window.location.href = "/login";
      }, 2000);
    } else {
      errorDiv.textContent = data.message || "Something went wrong.";
    }

  } catch (err) {
    errorDiv.textContent = "Network error. Please try again.";
  }
});
</script>

</body>
</html>
