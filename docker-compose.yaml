services:
  nginx:
    image: nginx:alpine
    container_name: nginx
    network_mode: host
    # ports:
    #   - "80:80"
    volumes:
      - ./confs/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./confs/nginx/html:/usr/share/nginx/html
    restart: unless-stopped
  
  frontend:
    image: frontend
    build:
      context: .
      dockerfile: ./frontend/frontend.Dockerfile
    ports:
      - "4000:80"
    restart: unless-stopped

  auth_server:
    image: auth
    build:
      context: .
      dockerfile: ./auth/auth.Dockerfile
    ports:
      - "${AUTH_SERVER_PORT}:${AUTH_SERVER_PORT}"
    restart: unless-stopped

  main_server:
    image: main
    build:
      context: .
      dockerfile: ./main/main.Dockerfile

    restart: unless-stopped
    ports:
      - "${MAIN_SERVER_PORT}:${MAIN_SERVER_PORT}"

  mongodb:
    image: mongo:latest
    container_name: mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD}
    volumes:
      - mongodb_data:/data/db
      - mongodb_config:/data/configdb

  redis:
    image: redis:8.4.0-alpine
    container_name: redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT}:6379"
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      REDIS_MAXMEMORY: ${REDIS_MEM_LIMIT}
    command:
      [
        "redis-server",
        "--requirepass", "${REDIS_PASSWORD}",
        "--appendonly", "yes",
        "--maxmemory", "${REDIS_MEM_LIMIT}",
        "--maxmemory-policy", "allkeys-lru"
      ]
    volumes:
      - redis_data:/data

# Monitering stack

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    volumes:
      - ./confs/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
    ports:
      - "9090:9090"
    networks:
      - monitor
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD}
    volumes:
      - grafana_data:/var/lib/grafana
    networks:
      - monitor
    depends_on:
      - prometheus
    restart: unless-stopped
  
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    container_name: cadvisor
    ports:
      - "8080:8080"
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
    networks:
      - monitor
    restart: unless-stopped

